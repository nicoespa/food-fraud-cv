# food-fraud-cv — config del PIPELINE REAL (full local: datos reales + difusión + fine-tune)
seed: 42

paths:
  raw: data/raw
  processed: data/processed
  generated: data/generated_real     # corpus real separado del sintético
  results: results

data:
  classes: [genuine-undamaged, genuine-damaged, fake-damaged]
  image_size: 224                    # tamaño de entrada del backbone ImageNet
  split: {train: 0.6, val: 0.2, test: 0.2}   # test más grande → métricas estables
  holdout_generator: sd-fungus       # variante de difusión vista SOLO en test

real:
  # ESCALA INFORMATIVA (correr en Colab GPU). Para validar rápido: --n-per-group 30 --steps 8.
  # imágenes reales por grupo (fresh y rotten) desde Densu341/Fresh-rotten-fruit.
  n_per_group: 150
  steps: 25                          # pasos altos → fakes SUTILES (más difícil = más informativo)

detection:
  # ViT IN-21k → mejor transferencia que resnet-IN1k. Fuerte: vit_base_patch16_clip_224.openai. Rápido: resnet50.
  backbone: vit_small_patch16_224.augreg_in21k
  epochs: 12
  batch_size: 32
  lr: 0.0003
  calibration: isotonic

decision:
  costs: {c_fn: 10.0, c_fp: 3.0, c_review: 1.0}

evaluation:
  metrics: [pr_auc, roc_auc, tpr_at_fpr, ece, brier, expected_cost]
  tpr_at_fpr: 0.05
  per_generator_breakdown: true
  bootstrap_iters: 1000
